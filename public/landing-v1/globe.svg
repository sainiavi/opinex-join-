      <stop stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="0.42" stop-color="#EDEDED" stop-opacity="0.72" />
      <stop offset="0.78" stop-color="#BDBDBD" stop-opacity="0.35" />
